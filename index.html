<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário Steve universo</title>

  <link rel="stylesheet" href="./index.css">
</head>

<body>
  <header>
    <h1>Formulário Steve Universo</h1>
  </header>

  <main>
    <form action="O melhor do universo" method="POST">
      <section>
        <h2><label class="label_form" for="nome">Nome:</label></h2>
        <!--Seção dados do usuário-->
        <input type="text" id="nome" name="nome" placeholder="Insira seu nome" required />
        <br /><br />

        <h2><label class="label_form" for="mensagem">Mensagem:</label></h2>
        <textarea id="mensagem" name="mensagem" rows="4" placeholder="Personagem favorito de Steve Universo"
          required></textarea>
        <br /><br />

        <h2><label class="label_form" for="idade">Idade:</label></h2>
        <input type="number" id="idade" name="idade" min="1" max="120" placeholder="Digite sua idade" required />
        <br /><br />
      </section>

      <section>
        <h2><label class="label_form" for="classe">Personagem Preferido:</label></h2>
        <!--Seção perguntas sobre Steve Universo-->
        <select id="classe" name="classe" required>
          <option value="">Selecione uma opção</option>
          <option value="Garnet">Garnet</option>
          <option value="Ametista">Ametista</option>
          <option value="lapis">Lapis</option>
          <option value="Steve">Steve</option>
        </select>
        <br /><br />
      </section>

      <section>
        <h2><label class="label_form"  for="data">Data de envio:</label></h2>
        <!--Seção dados do formulário-->
        <input type="date" id="data" name="data" required />
        <br /><br />

        <button type="submit">Mandar</button>
      </section>
    </form>
  </main>

  <footer>
    <h4>
      <p>
         Rubi e Safira podem prever o que você vai escolher.
         Emelly Lazzaretti é o desenvolvidor da estrutura deste formulário.
      </p>
    </h4>
    <h3>O jardim de infancia pode ter suas memorias.</h3>
    <h3>Serviços de música, só com o senhor universo.</h3>
  </footer>
</body>

</html>

</body>

</html>
